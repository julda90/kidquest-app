services:
  postgres:
    image: postgres:16
    container_name: kidquest-postgres
    environment:
      ${DB_NAME}: kidquest
      ${DB_USERNAME}: kidquest
      ${DB_PASSWORD}: kidquest123
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: kidquest-redis
    ports:
      - "${REDIS_PORT}:6379"