name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl -s -X POST "http://localhost:8000/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}/start" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" -H "Content-Type: application/json"