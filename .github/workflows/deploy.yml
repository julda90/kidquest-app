name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push backend
        run: |
          docker build -t ghcr.io/julda90/kidquest-app/backend:latest .
          docker push ghcr.io/julda90/kidquest-app/backend:latest

      - name: Build and push frontend
        run: |
          docker build -t ghcr.io/julda90/kidquest-app/frontend:latest ./frontend
          docker push ghcr.io/julda90/kidquest-app/frontend:latest

      - name: Deploy to k3s
        run: |
          kubectl rollout restart deployment/kidquest-backend -n kidquest
          kubectl rollout restart deployment/kidquest-frontend -n kidquest