name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl -X GET "https://mymlyn.com/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&token=${{ secrets.COOLIFY_TOKEN }}"